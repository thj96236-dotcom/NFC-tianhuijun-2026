<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFC 神经功能整合中心</title>
    <style>
        :root { --primary: #3498db; --dark: #2c3e50; --bg: #f4f7f6; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            height: 100vh;
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        .portal-card { 
            background: white; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            text-align: center;
            max-width: 550px;
            width: 90%;
            border-top: 8px solid var(--primary);
        }
        h1 { color: var(--dark); margin-bottom: 10px; font-size: 2.2rem; }
        .version { color: var(--primary); font-weight: bold; margin-bottom: 20px; display: block; }
        .btn { 
            background: var(--primary); 
            color: white; 
            padding: 15px 40px; 
            text-decoration: none; 
            border-radius: 30px; 
            font-size: 1.2rem; 
            font-weight: bold;
            display: inline-block;
            transition: background 0.3s, transform 0.2s;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }
        .btn:hover { 
            background: #2980b9; 
            transform: scale(1.05); 
        }
        .features-grid { 
            margin-top: 30px; 
            text-align: left; 
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            color: #7f8c8d;
            font-size: 0.95rem;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        .feature-item { display: flex; align-items: center; }
        .dot { color: var(--primary); margin-right: 8px; font-weight: bold; }
        footer { margin-top: 25px; color: #bdc3c7; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="portal-card">
    <h1>🧠 NFC 专家导航</h1>
    <span class="version">临床决策辅助系统 v12.0</span>
    
    <a href="https://nfc-tianhuijun-2026-zpodbcmynf9ingup2mjghg.streamlit.app/" class="btn">
        立即进入系统
    </a>

    <div class="features-grid">
        <div class="feature-item"><span class="dot">●</span> NIHSS 自动评分</div>
        <div class="feature-item"><span class="dot">●</span> 急诊溶栓决策</div>
        <div class="feature-item"><span class="dot">●</span> 肉毒毒素管理</div>
        <div class="feature-item"><span class="dot">●</span> 患者抗凝自测</div>
        <div class="feature-item"><span class="dot">●</span> 医生抗凝决策</div>
    </div>

    <footer>
        田慧军医生作品 | 基于 First Principles 构建
    </footer>
</div>

</body>
</html>
